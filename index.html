<!DOCTYPE html>
<html>
<head>
  <title>Taelor Chat</title>

  <style>
    body {
      font-family: Arial;
      background: #f6f3ef;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 420px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    .header {
      background: #b08968;
      color: white;
      padding: 16px;
      font-weight: bold;
    }

    #chat {
      height: 450px;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 10px 12px;
      border-radius: 12px;
      max-width: 80%;
      font-size: 14px;
      line-height: 1.4;
    }

    .user {
      align-self: flex-end;
      background: #b08968;
      color: white;
    }

    .bot {
      align-self: flex-start;
      background: #f1ece7;
      color: #222;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #eee;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      background: #b08968;
      color: white;
      border: none;
      padding: 0 18px;
      cursor: pointer;
    }

    button:hover {
      background: #9a6f4e;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    Taelor Chatbot Demo
  </div>

  <div id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Ask a question..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script>
// We keep track of history in a simple string to send to the backend
let chatHistory = "";

async function send() {
  const input = document.getElementById("msg");
  const msg = input.value.trim();
  if (!msg) return;

  // 1. Render user message in UI
  addMessage("You", msg, "user");
  input.value = "";

  // 2. Visual indicator that the bot is thinking
  const typingDiv = addMessage("Bot", "...", "bot");

  try {
    // 3. Make the fetch call matching FastAPI's ChatRequest model
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ 
        question: msg,       // Changed from 'message' to 'question'
        history: chatHistory 
      })
    });

    if (!res.ok) {
      throw new Error("Network response was not ok");
    }

    const data = await res.json();
    
    // Remove the typing indicator
    typingDiv.remove();

    // 4. Render the actual answer (matching FastAPI's 'answer' key)
    addMessage("Bot", data.answer, "bot"); 

    // 5. Update local history context for the next turn
    chatHistory += `user: ${msg}\nassistant: ${data.answer}\n`;

  } catch (error) {
    console.error("Error calling API:", error);
    typingDiv.innerText = "Sorry, something went wrong. Please try again.";
  }
}

function addMessage(sender, text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  const chatWindow = document.getElementById("chat");
  chatWindow.appendChild(div);
  chatWindow.scrollTop = chatWindow.scrollHeight;
  return div; // Return the element so we can remove it if needed (like typing dots)
}

// Optional: Allow pressing "Enter" key to send messages
document.getElementById("msg").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    send();
  }
});
</script>

</body>
</html>
